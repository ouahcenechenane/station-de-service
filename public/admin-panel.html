<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panneau Admin - Gestion du Menu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-panel {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 100px 20px 60px;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-header {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-title {
            font-size: 2rem;
            font-weight: 800;
            color: #004E89;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logout-btn {
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.4);
        }

        .menu-section {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #f0f0f0;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #004E89;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .add-btn {
            padding: 0.7rem 1.2rem;
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        .menu-items {
            display: grid;
            gap: 1rem;
        }

        .menu-item-card {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .menu-item-card:hover {
            border-color: #667eea;
            transform: translateX(5px);
        }

        .item-info {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            flex: 1;
        }

        .item-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #004E89;
        }

        .item-price {
            font-weight: 800;
            font-size: 1.2rem;
            color: #f5b097fb;
        }

        .item-actions {
            display: flex;
            gap: 0.5rem;
        }

        .edit-btn, .delete-btn {
            padding: 0.6rem 1rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .edit-btn {
            background: linear-gradient(135deg, #ffc107 0%, #ff9800 100%);
            color: white;
        }

        .edit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 193, 7, 0.4);
        }

        .delete-btn {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
        }

        .delete-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.4);
        }

        /* Modal pour ajouter/modifier */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.4s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #004E89;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            color: #dc3545;
            transform: rotate(90deg);
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .save-btn {
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .item-actions {
                flex-direction: column;
            }

            .menu-item-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <nav>
            <div class="logo">
                <span class="logo-icon"><i class="fas fa-gas-pump"></i></span>
                <span class="logo-text">Station Service & Hôtel</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html"><i class="fas fa-home"></i> Retour au site</a></li>
            </ul>
        </nav>
    </header>

    <div class="admin-panel">
        <div class="admin-container">
            <!-- En-tête Admin -->
            <div class="admin-header">
                <div class="admin-title">
                    <i class="fas fa-cogs"></i>
                    Panneau d'Administration
                </div>
                <button class="logout-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    Déconnexion
                </button>
            </div>

            <!-- Plats Principaux -->
            <div class="menu-section">
                <div class="section-header">
                    <h2 class="section-title">
                        <i class="fas fa-plate-wheat"></i>
                        Plats Principaux
                    </h2>
                    <button class="add-btn" onclick="openAddModal('plats')">
                        <i class="fas fa-plus"></i>
                        Ajouter un plat
                    </button>
                </div>
                <div class="menu-items" id="platsContainer"></div>
            </div>

            <!-- Boissons -->
            <div class="menu-section">
                <div class="section-header">
                    <h2 class="section-title">
                        <i class="fas fa-glass-water"></i>
                        Boissons
                    </h2>
                    <button class="add-btn" onclick="openAddModal('boissons')">
                        <i class="fas fa-plus"></i>
                        Ajouter une boisson
                    </button>
                </div>
                <div class="menu-items" id="boissonsContainer"></div>
            </div>

            <!-- Desserts -->
            <div class="menu-section">
                <div class="section-header">
                    <h2 class="section-title">
                        <i class="fas fa-ice-cream"></i>
                        Desserts
                    </h2>
                    <button class="add-btn" onclick="openAddModal('desserts')">
                        <i class="fas fa-plus"></i>
                        Ajouter un dessert
                    </button>
                </div>
                <div class="menu-items" id="dessertsContainer"></div>
            </div>
        </div>
    </div>

    <!-- Modal Ajouter/Modifier -->
    <div class="modal" id="itemModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Ajouter un élément</h3>
                <button class="close-btn" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form class="modal-form" id="itemForm">
                <div class="form-group">
                    <label for="itemName">
                        <i class="fas fa-utensils"></i> Nom du plat
                    </label>
                    <input 
                        type="text" 
                        id="itemName" 
                        placeholder="Ex: Couscous royal"
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="itemPrice">
                        <i class="fas fa-tag"></i> Prix (DA)
                    </label>
                    <input 
                        type="number" 
                        id="itemPrice" 
                        placeholder="Ex: 1200"
                        min="0"
                        required
                    >
                </div>
                <button type="submit" class="save-btn">
                    <i class="fas fa-save"></i>
                    Enregistrer
                </button>
            </form>
        </div>
    </div>

    <script src="admin-script.js"></script>
</body>
</html>
